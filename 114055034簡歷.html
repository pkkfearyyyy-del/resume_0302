<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>個人履歷</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:#efefef;
}

/* 外框 */
.container{
width:900px;
margin:40px auto;
background:white;
padding:30px 40px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

/* 標題 */
.title{
text-align:center;
font-size:32px;
margin-bottom:30px;
}

/* 個人區 */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.name{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.info{
line-height:1.8;
color:#444;
}

/* 照片 */
.photo{
width:120px;
height:150px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* 區塊 */
.section{
margin-top:25px;
}

/* 藍色標籤 */
.label{
display:inline-block;
background:#3f5fa8;
color:white;
padding:6px 14px;
border-radius:0 10px 10px 0;
margin-bottom:10px;
}

/* 內容 */
.content{
border-top:1px solid #ccc;
padding-top:10px;
line-height:1.8;
color:#444;
}

/* 波浪線 */
.wave{
border-bottom:2px dashed #999;
margin:15px 0;
}

/* 按鈕 */
button{
margin-top:10px;
padding:8px 15px;
background:#3f5fa8;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#msg{
margin-top:10px;
color:#3f5fa8;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="title">波浪線外框履歷表</div>

<div class="header">
<div>
<div class="name">你的名字</div>
<div class="info">
出生年月：請填寫<br>
地址：請填寫<br>
學校：亞洲大學<br>
系級：室內設計系<br>
學號：AU114001001
</div>
</div>

<div class="photo">照片</div>
</div>

<!-- 教育 -->
<div class="section">
<div class="label">教育背景</div>
<div class="content">
亞洲大學 室內設計學系<br>
學習空間設計、繪圖與創作能力
<div class="wave"></div>
</div>
</div>

<!-- 經歷 -->
<div class="section">
<div class="label">經歷</div>
<div class="content">
● 社團活動經驗<br>
● 團隊合作與活動規劃<br>
● 自主學習畫畫與設計
<div class="wave"></div>
</div>
</div>

<!-- 技能 -->
<div class="section">
<div class="label">技能</div>
<div class="content">
● Sketch / 繪圖能力<br>
● 空間觀察能力<br>
● 創意思考<br>
● 溝通與合作能力
<div class="wave"></div>
</div>
</div>

<!-- 自我介紹 -->
<div class="section">
<div class="label">自我介紹</div>
<div class="content">
我目前就讀亞洲大學室內設計系，對空間設計與創作充滿興趣。
平時會透過描圖與觀察來提升自己的設計能力，也喜歡嘗試不同風格。
希望未來能將創意與實用結合，設計出有溫度的空間。
</div>

<button onclick="hello()">點我</button>
<div id="msg"></div>

</div>

</div>

<script>
function hello(){
document.getElementById("msg").innerText="你已經比昨天更進步了一點點 ✨";
}
</script>

</body>
</html>
